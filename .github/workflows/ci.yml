name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Dependency audit (ReCheck)
        run: npx recheck site --packages > recheck-report.txt || true
        continue-on-error: true

      - name: Upload ReCheck report
        uses: actions/upload-artifact@v4
        with:
          name: recheck-report
          path: recheck-report.txt

  build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: gatepaste-extension
          path: dist/
